<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="{{ url_for('static', filename='assets/icons/icon.ico') }}" type="image/x-icon">
    <title>Price Calculator | Seller Toolset</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/price_calculator.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/anim/price_calculator.css') }}">
</head>

<body>
    {% include 'components/header.html' %}

    <main class="main column gap-100">
        <section class="calculator">
            <section class="section column gap-40">
                <div class="left-panel grid gap-20">
                    <div class="stats-card column gap-10">
                        <div class="heading column">
                            <h3 class="h3">Inputs</h3>
                            <hr class="divider">
                        </div>

                        <div class="body column gap-10">
                            <div class="input-row row h-sb gap-5">
                                <label for="productCost" class="row gap-10">
                                    <span class="symbol fl-icon">currency_rupee</span>
                                    <span class="text">Product Cost (₹)</span>
                                </label>
                                <input type="number" name="productCost" id="productCost" class="input"
                                    placeholder="e.g.: 100">
                            </div>
                            <hr class="divider">

                            <div class="input-row row h-sb gap-5">
                                <label for="packagingCost" class="row gap-10">
                                    <span class="symbol fl-icon">box</span>
                                    <span class="text">Packaging cost (₹)</span>
                                </label>
                                <input type="number" name="packagingCost" id="packagingCost" class="input"
                                    placeholder="e.g.: 10">
                            </div>
                            <hr class="divider">

                            <div class="input-row row h-sb gap-5">
                                <label for="shippingCost" class="row gap-10">
                                    <span class="symbol fl-icon">local_shipping</span>
                                    <span class="text">Shipping cost (₹)</span>
                                </label>
                                <input type="number" name="shippingCost" id="shippingCost" class="input"
                                    placeholder="e.g.: 60">
                            </div>
                        </div>
                    </div>

                    <div class="stats-card column gap-10">
                        <div class="heading column">
                            <h3 class="h3">Hidden losses</h3>
                            <hr class="divider">
                        </div>

                        <div class="body column gap-10">
                            <div class="input-row row h-sb gap-5">
                                <label for="customerReturn" class="row gap-10">
                                    <span class="symbol fl-icon">subdirectory_arrow_left</span>
                                    <span class="text">Customer return (₹)</span>
                                </label>
                                <input type="number" name="customerReturn" id="customerReturn" class="input"
                                    placeholder="e.g.: 20">
                            </div>
                            <hr class="divider">

                            <div class="input-row row h-sb gap-5">
                                <label for="rtoLoss" class="row gap-10">
                                    <span class="symbol fl-icon">moped</span>
                                    <span class="text">RTO Loss (₹)</span>
                                </label>
                                <input type="number" name="rtoLoss" id="rtoLoss" class="input"
                                    placeholder="e.g.: 10">
                            </div>
                        </div>
                    </div>

                    <div class="stats-card column gap-10">
                        <div class="heading column">
                            <h3 class="h3">Additional expense</h3>
                            <hr class="divider">
                        </div>

                        <div class="body column gap-10">
                            <div class="input-row row h-sb gap-5">
                                <label for="adsCost" class="row gap-10">
                                    <span class="symbol fl-icon">ad</span>
                                    <span class="text">Ads cost (₹)</span>
                                </label>
                                <input type="number" name="adsCost" id="adsCost" class="input"
                                    placeholder="e.g.: 10">
                            </div>
                            <hr class="divider">
                            
                            <div class="input-row row h-sb gap-5">
                                <label for="platformFees" class="row gap-10">
                                    <span class="symbol fl-icon">toll</span>
                                    <span class="text">Platform fees (%)</span>
                                </label>
                                <input type="number" name="platformFees" id="platformFees" class="input"
                                    placeholder="e.g.: 20">
                            </div>
                            <hr class="divider">

                            <div class="input-row row h-sb gap-5">
                                <label for="gst" class="row gap-10">
                                    <span class="symbol fl-icon">account_balance</span>
                                    <span class="text">GST (%)</span>
                                </label>
                                <input type="number" name="gst" id="gst" class="input"
                                    placeholder="e.g.: 18" value="18">
                            </div>
                        </div>
                    </div>

                    <div class="stats-card column gap-10">
                        <div class="heading column">
                            <h3 class="h3">Pricing controls</h3>
                            <hr class="divider">
                        </div>

                        <div class="body column gap-10">
                            <div class="input-row row h-sb gap-5">
                                <label for="profitMargin" class="row gap-10">
                                    <span class="symbol fl-icon">percent</span>
                                    <span class="text">Profit margin (₹)</span>
                                </label>
                                <input type="number" name="profitMargin" id="profitMargin" class="input"
                                    placeholder="e.g.: 50">
                            </div>
                            <hr class="divider">

                            <div class="input-row row h-sb gap-5">
                                <label for="discount" class="row gap-10">
                                    <span class="symbol fl-icon">percent_discount</span>
                                    <span class="text">Discounts (%)</span>
                                </label>
                                <input type="number" name="discount" id="discount" class="input"
                                    placeholder="e.g.: 10" value="0">
                            </div>
                        </div>
                    </div>

                    <div class="actions res-row gap-10">
                        <div class="btn fl" id="calcBtn">Calculate</div>
                        <div class="btn ot" id="resBtn">Reset</div>
                    </div>
                </div>

                <div class="right-panel column gap-20">
                    <div class="stats-card column gap-10">
                        <div class="heading column">
                            <h3 class="h3">Summary</h3>
                            <hr class="divider">
                        </div>

                        <div class="body column gap-10">
                            <div class="input-row row h-sb gap-5">
                                <div class="row gap-10">
                                    <span class="symbol fl-icon">stacks</span>
                                    <span class="text">Total cost (₹)</span>
                                </div>
                                <span class="text" id="totalCostOutput">₹ 0.00</span>
                            </div>
                            <hr class="divider">
                            
                            <div class="input-row row h-sb gap-5">
                                <div class="row gap-10">
                                    <span class="symbol fl-icon">toll</span>
                                    <span class="text">Platform fees (₹)</span>
                                </div>
                                <span class="text" id="platformFeesOutput">₹ 0.00</span>
                            </div>
                            <hr class="divider">
                            
                            <div class="input-row row h-sb gap-5">
                                <div class="row gap-10">
                                    <span class="symbol fl-icon">account_balance</span>
                                    <span class="text">GST (₹)</span>
                                </div>
                                <span class="text" id="gstOutput">₹ 0.00</span>
                            </div>
                            <hr class="divider">
                            
                            <div class="input-row row h-sb gap-5">
                                <div class="row gap-10">
                                    <span class="symbol fl-icon">sell</span>
                                    <span class="text">Suggested selling price</span>
                                </div>
                                <span class="text output" id="sellingPriceOutput">₹ 0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </section>

        <script type="module" src="{{ url_for('static', filename='js/pages/price_calculator.js') }}"></script>
    </main>
</body>

</html>
